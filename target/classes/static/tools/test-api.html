<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testUsers()">Test Users</button>
    <div id="result"></div>

    <script>
        let token = '';

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:7070/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const data = await response.json();
                token = data.token;
                document.getElementById('result').innerHTML = '<h3>Login Success</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>Login Error</h3><pre>' + error.message + '</pre>';
            }
        }

        async function testUsers() {
            if (!token) {
                document.getElementById('result').innerHTML = '<h3>Error</h3><p>Please login first</p>';
                return;
            }
            try {
                const response = await fetch('http://localhost:7070/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h3>Users Data</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>Users Error</h3><pre>' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
