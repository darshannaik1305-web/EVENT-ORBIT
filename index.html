<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>College Event Management</title>
  <style>
    /* Reset and base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f9;
      display: flex;
      flex-direction: column;
    }
    a, button {
      cursor: pointer;
    }
    /* LOGIN PAGE */
    #loginPage {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #34495e url('https://media.collegedekho.com/media/img/news/college_fests.jpg?height=310&width=615') no-repeat center center fixed;
      background-size: cover;
      color: #ecf0f1;
      padding: 20px;
      position: relative;
    }
    #loginPage::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }
    #loginBox {
      background: rgba(255, 255, 255, 0.3);
      padding: 30px 40px;
      border-radius: 12px;
      width:300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }
    #loginBox h2 {
      margin-bottom: 25px;
      text-align: center;
      font-weight: 700;
    }
    #loginBox label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    #loginBox input {
      width: 100%;
      padding: 8px 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }
    #loginButtons {
      margin-top: 25px;
      display: flex;
      justify-content: space-between;
    }
    #loginButtons button {
      flex: 1;
      margin: 0 5px;
      border: none;
      background: #2980b9;
      color: white;
      padding: 10px 0;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 8px;
      transition: background 0.3s ease;
    }
    #loginButtons button:hover {
      background: #1c5980;
    }
    #loginError {
      color: #e74c3c;
      margin-top: 12px;
      font-size: 0.9rem;
      height: 20px;
      text-align: center;
    }
    /* MAIN PAGE LAYOUT */
    #mainPage {
      display: none;
      flex: 1;
      flex-direction: column;
      height: 100vh;
    }
    header#mainHeader {
      background: rgba(255, 255, 255, 0.4);
      color: rgb(0, 0, 0);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }
    #menuToggle {
      font-size: 1.8rem;
      background: none;
      border: none;
      color: rgb(0, 0, 0);
    }
    #topRightButtons {
      display: flex;
      gap: 12px;
    }
    #topRightButtons button {
      background: #ffffff;
      border: none;
      color: rgb(0, 0, 0);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      transition: background 0.3s;
    }
    #topRightButtons button:hover {
      background: #ffffff;
    }
    #sideMenu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 250px;
      height: 100%;
      background: #ffffff;
      box-shadow: 3px 0 8px rgba(0,0,0,0.3);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: left 0.3s ease;
      z-index: 9999;
    }
    #sideMenu.visible {
      left: 0;
    }
    #sideMenu h3 {
      color: #000000;
      margin-bottom: 15px;
      font-weight: 700;
    }
    #sideMenu a {
      color: #000000;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 8px 12px;
      border-radius: 8px;
      background: #ffffff;
      transition: background 0.3s ease;
      display: block;
    }
    #sideMenu a:hover, #sideMenu a:focus {
      background: #2a3e73;
      outline: none;
    }
    main#content {
      flex: 1;
      display: flex;
      padding: 20px 25px;
      gap: 25px;
      background: #ecf0f1 url('https://img.freepik.com/free-photo/amazing-beautiful-art-sky-with-colorful-clouds_58702-1688.jpg?semt=ais_hybrid&w=740') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }
    main#content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1;
    }
    #clubContainer {
      flex: 1.7;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      position: relative;
      z-index: 2;
    }
    #winnersContainer {
      flex: 0.8;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 0 16px 25px -10px #4a5568cc;
      position: relative;
      z-index: 2;
      overflow: hidden;
    }
    #winnersContainer::before {
      content: "🏆";
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 100px;
      opacity: 0.1;
      transform: rotate(-15deg);
    }
    #winnersContainer h3 {
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 1.2rem;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #winnersList {
      overflow-y: auto;
      flex: 1;
      max-height: 400px;
    }
    .winner-item {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .winner-item:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .winner-club {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 5px;
      color: #ffd700;
    }
    .winner-event {
      font-size: 0.8rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .winner-details {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .winner-position {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-right: 5px;
    }
    .position-first { background: rgba(255, 215, 0, 0.3); }
    .position-second { background: rgba(192, 192, 192, 0.3); }
    .position-third { background: rgba(205, 127, 50, 0.3); }
    .clubBox {
      background: #3498db;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      height: 130px;
      cursor: pointer;
      box-shadow: 0 8px 15px -5px #2980b980;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      position: relative;
      user-select: none;
      overflow: hidden;
    }
    .clubBox .clubImage {
      flex: 1;
      background-size: cover;
      background-position: center;
      width: 100%;
    }
    .clubBox .clubName {
      background: rgba(0, 0, 0, 0.8);
      padding: 8px 5px;
      text-align: center;
      font-size: 0.85rem;
      line-height: 1.2;
      min-height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .clubBox:hover {
      transform: scale(1.05);
      box-shadow: 0 16px 25px -10px #2980b9cc;
    }
    .clubBox:after {
      content: "";
      position: absolute;
      border-radius: 12px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .clubBox:hover:after {
      opacity: 1;
    }
    #notificationBox {
      flex: 1;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      color: rgb(0, 0, 0);
      display: flex;
      flex-direction: column;
      padding: 15px 20px;
      box-shadow: 0 16px 25px -10px #1c5980cc;
      position: relative;
      z-index: 2;
    }
    #notificationBox h3 {
      margin-bottom: 14px;
      font-weight: 700;
    }
    #notificationList {
      overflow-y: auto;
      flex: 1;
      max-height: 300px;
    }
    #notificationList li {
      margin-bottom: 10px;
      cursor: default;
    }
    #notificationList li span.date {
      font-size: 0.8rem;
      color: #d6eaf8;
      font-weight: 400;
    }
    #eventsModal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 20000;
      padding: 10px;
      overflow-y: auto;
    }
    #eventsModal.visible {
      display: flex;
    }
    #eventsModalContent {
      background: white;
      border-radius: 14px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 25px 30px;
      box-shadow: 0 12px 40px rgba(50,50,50,0.3);
      position: relative;
    }
    #winnersModal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 20000;
      padding: 10px;
      overflow-y: auto;
    }
    #winnersModal.visible {
      display: flex;
    }
    #winnersModalContent {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 14px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 25px 30px;
      box-shadow: 0 12px 40px rgba(50,50,50,0.3);
      position: relative;
      color: white;
    }
    #winnersModalContent h2 {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }
    #closeWinnersModalBtn {
      position: absolute;
      top: 12px;
      right: 15px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      transition: color 0.3s ease;
    }
    #closeWinnersModalBtn:hover {
      color: white;
    }
    #eventsModalContent h2 {
      margin-bottom: 20px;
      font-weight: 700;
      text-align: center;
    }
    #closeModalBtn {
      position: absolute;
      top: 12px;
      right: 15px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #888;
      transition: color 0.3s ease;
    }
    #closeModalBtn:hover {
      color: #000;
    }
    .eventBox {
      border: 1px solid #2980b9;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 16px;
      background: #f7fbff;
    }
    .eventBox h3 {
      font-weight: 700;
      color: #2980b9;
    }
    .eventBox p {
      margin: 8px 0 14px 0;
      line-height: 1.3;
    }
    .registerBtn {
      background: #3498db;
      border: none;
      color: white;
      padding: 8px 20px;
      font-weight: 700;
      border-radius: 20px;
      transition: background 0.3s ease;
    }
    .registerBtn:hover {
      background: #1c5980;
    }
    .registrationFormContainer {
      margin-top: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
      font-size: 0.9rem;
    }
    .registrationFormContainer label {
      font-weight: 600;
    }
    .registrationFormContainer input {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    .registrationFormContainer button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: 600;
      margin-top: 5px;
      transition: background 0.3s ease;
    }
    .registrationFormContainer button:hover {
      background: #1f7a45;
    }
    .regMsg {
      margin-top: 6px;
      font-weight: 600;
    }
        .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @media (max-width: 900px) {
      #clubContainer {
        grid-template-columns: repeat(2, 1fr);
      }
      main#content {
        flex-direction: column;
        padding: 15px 15px;
      }
      #winnersContainer {
        width: 100%;
        margin-top: 25px;
        flex: none;
        height: 250px;
      }
      #notificationBox {
        width: 100%;
        margin-top: 25px;
        flex: none;
        height: 200px;
      }
    }
    @media (max-width: 600px) {
      #clubContainer {
        grid-template-columns: 1fr;
      }
      #loginBox {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
<!-- LOGIN PAGE -->
<div id="loginPage">
  <div id="loginBox">
    <h2>MVJ COLLEGE OF ENGINEERING</h2>
    <form id="loginForm" onsubmit="return false;">
      <label for="usernameInput">USN:</label>
      <input type="text" id="usernameInput" autocomplete="username" required placeholder="Enter USN" minlength="10" maxlength="10" pattern="1MJ[A-Z0-9]{7}" title="USN must be in format 1MJ******* (all caps)" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()" />
      <label for="passwordInput">Password:</label>
      <input type="password" id="passwordInput" autocomplete="current-password" required />
      <div id="loginButtons">
        <button type="button" onclick="attemptLogin('user')">Student Login</button>
      </div>
      <div style="margin-top: 10px; text-align: center;">
        <button type="button" style="background: transparent; border: none; color: #ffffff; text-decoration: underline; font-weight: 600;" onclick="showRegisterForm()">Create new account</button>
      </div>
      <div id="loginError" role="alert" aria-live="assertive"></div>
      <div class="spinner" id="loginSpinner"></div>
    </form>

    <form id="registerForm" onsubmit="return false;" style="display:none;">
      <label for="registerUsnInput">USN:</label>
      <input type="text" id="registerUsnInput" required minlength="10" maxlength="10" pattern="1MJ[A-Z0-9]{7}" title="USN must be in format 1MJ******* (all caps)" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()" />

      <label for="registerFullNameInput">Full Name:</label>
      <input type="text" id="registerFullNameInput" required />

      <label for="registerPasswordInput">Create Password:</label>
      <input type="password" id="registerPasswordInput" autocomplete="new-password" required />

      <label for="registerConfirmPasswordInput">Re-enter Password:</label>
      <input type="password" id="registerConfirmPasswordInput" autocomplete="new-password" required />

      <label for="registerMobileInput">Mobile Number:</label>
      <input type="tel" id="registerMobileInput" pattern="[0-9]{10}" maxlength="10" required placeholder="10-digit mobile number" />

      <label for="registerEmailInput">Email:</label>
      <input type="email" id="registerEmailInput" autocomplete="email" required />

      <label for="registerGenderInput">Gender:</label>
      <select id="registerGenderInput" required style="padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem;">
        <option value="">Select</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
      <div id="registerButtons" style="margin-top: 25px; display: flex; justify-content: space-between;">
        <button type="button" onclick="attemptRegister()" style="flex:1; margin: 0 5px; border: none; background: #27ae60; color: white; padding: 10px 0; font-weight: 600; font-size: 1rem; border-radius: 8px; transition: background 0.3s ease;">Register</button>
        <button type="button" onclick="showLoginForm()" style="flex:1; margin: 0 5px; border: none; background: #7f8c8d; color: white; padding: 10px 0; font-weight: 600; font-size: 1rem; border-radius: 8px; transition: background 0.3s ease;">Back</button>
      </div>
      <div id="registerError" role="alert" aria-live="assertive" style="color: #e74c3c; margin-top: 12px; font-size: 0.9rem; height: 20px; text-align: center;"></div>
      <div class="spinner" id="registerSpinner"></div>
    </form>
  </div>
</div>
<!-- MAIN PAGE -->
<div id="mainPage">
  <header id="mainHeader">
    <button id="menuToggle" aria-label="Toggle menu" onclick="toggleMenu()">☰</button>
    <div id="topRightButtons">
      <button onclick="goHome()">Home</button>
      <button onclick="contact()">Contact</button>
      <button onclick="helpPage()">Help</button>
    </div>
    <nav id="sideMenu" aria-label="User menu">
      <h3>User Menu</h3>
      <a href="#" id="userAccountDetailsLink" tabindex="0">Account Details</a>
      <a href="#" onclick="logout()" tabindex="0">Logout</a>
      <a href="#" onclick="about()" tabindex="0">About</a>
    </nav>
  </header>
  <main id="content">
    <section id="clubContainer" aria-label="Club list"></section>
    <section id="winnersContainer" aria-label="Winners">
      <h3>🏆 Event Winners</h3>
      <div id="winnersList">
        <p style="text-align: center; opacity: 0.7;">Loading winners...</p>
      </div>
    </section>
    <aside id="notificationBox" aria-label="Notifications">
      <h3>Recent Events & Updates</h3>
      <ul id="notificationList" role="list"></ul>
    </aside>
  </main>
</div>
<!-- EVENTS MODAL -->
<div id="eventsModal" role="dialog" aria-modal="true" aria-labelledby="eventsModalTitle" tabindex="-1">
  <div id="eventsModalContent">
    <button id="closeModalBtn" aria-label="Close events modal" onclick="closeEventsModal()">×</button>
    <h2 id="eventsModalTitle">Events for Club</h2>
    <div id="eventsList"></div>
  </div>
</div>
<!-- WINNERS MODAL -->
<div id="winnersModal" role="dialog" aria-modal="true" aria-labelledby="winnersModalTitle" tabindex="-1">
  <div id="winnersModalContent">
    <button id="closeWinnersModalBtn" aria-label="Close winners modal" onclick="closeWinnersModal()">×</button>
    <h2 id="winnersModalTitle">Event Winners</h2>
    <div id="winnersModalList"></div>
  </div>
</div>
<script>
  const API_BASE_URL = 'http://localhost:7070/api';

  // Data Structures - Now fetched from backend
  let clubs = [];
  let events = {};
  let currentUser = null;
  let authToken = null;

  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return hash;
  }

  // FIXED: Enhanced sanitizeInput for better security
  function sanitizeInput(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function saveData() {
    localStorage.setItem('cem_user', JSON.stringify(currentUser));
    if (authToken) {
      localStorage.setItem('cem_token', authToken);
    }
  }

  function loadData() {
    try {
      const savedUser = localStorage.getItem('cem_user');
      const savedToken = localStorage.getItem('cem_token');
      
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
      }
      if (savedToken) {
        authToken = savedToken;
      }
    } catch (error) {
      console.error('Error loading data from localstorage:', error);
      currentUser = null;
      authToken = null;
    }
  }

  function toggleSpinner(spinnerId, show) {
    document.getElementById(spinnerId).style.display = show ? 'block' : 'none';
  }

  function attemptLogin(role) {
    const username = sanitizeInput(document.getElementById('usernameInput').value.trim()).toUpperCase();
    const password = document.getElementById('passwordInput').value;
    const errElem = document.getElementById('loginError');
    errElem.textContent = '';

    const usnRegex = /^1MJ[A-Z0-9]{7}$/;
    if (!usnRegex.test(username)) {
      errElem.textContent = 'Invalid USN. Use format 1MJ******* (all capital letters).';
      return;
    }

    if (!username || !password) {
      errElem.textContent = 'Please enter username and password';
      return;
    }
    toggleSpinner('loginSpinner', true);

    // Call backend API for authentication
    fetch(`${API_BASE_URL}/auth/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ username, password })
    })
    .then(response => {
      if (!response.ok) {
        throw new Error('Invalid credentials');
      }
      return response.json();
    })
    .then(data => {
      currentUser = { username: data.username, role: data.role.toLowerCase() };
      authToken = data.token;
      saveData();
      loginSuccess();
    })
    .catch(error => {
      errElem.textContent = 'Invalid credentials.';
    })
    .finally(() => {
      toggleSpinner('loginSpinner', false);
    });
  }

  function showRegisterForm() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('loginError').textContent = '';
    document.getElementById('registerError').textContent = '';
    document.getElementById('registerUsnInput').focus();
  }

  function showLoginForm() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerError').textContent = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('usernameInput').focus();
  }

  function attemptRegister() {
    const usn = sanitizeInput(document.getElementById('registerUsnInput').value.trim()).toUpperCase();
    const fullName = sanitizeInput(document.getElementById('registerFullNameInput').value.trim());
    const password = document.getElementById('registerPasswordInput').value;
    const confirmPassword = document.getElementById('registerConfirmPasswordInput').value;
    const mobile = sanitizeInput(document.getElementById('registerMobileInput').value.trim());
    const email = sanitizeInput(document.getElementById('registerEmailInput').value.trim());
    const gender = sanitizeInput(document.getElementById('registerGenderInput').value);
    const errElem = document.getElementById('registerError');
    errElem.textContent = '';

    const usnRegex = /^1MJ[A-Z0-9]{7}$/;
    if (!usnRegex.test(usn)) {
      errElem.textContent = 'Invalid USN. Use format 1MJ******* (all capital letters).';
      return;
    }

    if (!usn || !fullName || !password || !confirmPassword || !mobile || !email || !gender) {
      errElem.textContent = 'Please fill all fields.';
      return;
    }

    if (!/^[A-Za-z0-9]+$/.test(usn)) {
      errElem.textContent = 'Please enter a valid USN.';
      return;
    }

    if (password !== confirmPassword) {
      errElem.textContent = 'Passwords do not match.';
      return;
    }

    if (!/^\d{10}$/.test(mobile)) {
      errElem.textContent = 'Please enter a valid 10-digit mobile number.';
      return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errElem.textContent = 'Please enter a valid email address.';
      return;
    }

    toggleSpinner('registerSpinner', true);

    fetch(`${API_BASE_URL}/auth/register`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ usn, fullName, password, mobile, email, gender })
    })
    .then(async response => {
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || 'Registration failed');
      }
      return data;
    })
    .then(() => {
      document.getElementById('usernameInput').value = usn;
      document.getElementById('passwordInput').value = password;
      document.getElementById('registerUsnInput').value = '';
      document.getElementById('registerFullNameInput').value = '';
      document.getElementById('registerPasswordInput').value = '';
      document.getElementById('registerConfirmPasswordInput').value = '';
      document.getElementById('registerMobileInput').value = '';
      document.getElementById('registerEmailInput').value = '';
      document.getElementById('registerGenderInput').value = '';
      showLoginForm();
      attemptLogin('user');
    })
    .catch(error => {
      errElem.textContent = error.message || 'Registration failed.';
    })
    .finally(() => {
      toggleSpinner('registerSpinner', false);
    });
  }

  function loginSuccess() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    document.getElementById('usernameInput').value = '';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').textContent = '';
    populateClubs();
    populateNotifications();
    populateWinners();
    updateMenuUserDetails();
  }

  function populateClubs() {
    fetch(`${API_BASE_URL}/clubs`)
      .then(response => response.json())
      .then(data => {
        clubs = data;
        const container = document.getElementById('clubContainer');
        container.innerHTML = '';
        clubs.forEach(club => {
          const div = document.createElement('div');
          div.className = 'clubBox';
          div.id = club.id;
          div.setAttribute('tabindex', 0);
          div.setAttribute('role', 'button');
          div.setAttribute('aria-label', `View events for ${sanitizeInput(club.name)}`);
          
          // Create image container
          const imageDiv = document.createElement('div');
          imageDiv.className = 'clubImage';
          if (club.imageUrl) {
            imageDiv.style.backgroundImage = `url('${sanitizeInput(club.imageUrl)}')`;
            console.log(`Applied background image for ${club.name}: ${club.imageUrl}`);
            const img = new Image();
            img.src = club.imageUrl;
            img.onerror = () => {
              console.error(`Failed to load image for ${club.name}: ${club.imageUrl}`);
              imageDiv.style.backgroundImage = 'none';
              div.style.backgroundColor = '#3498db';
            };
          } else {
            console.warn(`No image path/URL for ${club.name}`);
            div.style.backgroundColor = '#3498db';
          }
          
          // Create name container
          const nameDiv = document.createElement('div');
          nameDiv.className = 'clubName';
          nameDiv.textContent = club.name;
          
          div.appendChild(imageDiv);
          div.appendChild(nameDiv);
          
          div.addEventListener('click', () => showEvents(club.id, div));
          div.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              showEvents(club.id, div);
            }
          });
          container.appendChild(div);
        });
      })
      .catch(error => {
        console.error('Error fetching clubs:', error);
        alert('Failed to load clubs. Please try again.');
      });
  }

  function populateWinners() {
    const winnersListElem = document.getElementById('winnersList');
    winnersListElem.innerHTML = '<p style="text-align: center; opacity: 0.7;">Loading winners...</p>';

    fetch(`${API_BASE_URL}/winners`)
      .then(response => response.json())
      .then(winners => {
        winnersListElem.innerHTML = '';
        
        if (winners.length === 0) {
          winnersListElem.innerHTML = '<p style="text-align: center; opacity: 0.7;">No winners announced yet.</p>';
          return;
        }

        // Group winners by club
        const winnersByClub = {};
        winners.forEach(winner => {
          if (!winnersByClub[winner.clubId]) {
            winnersByClub[winner.clubId] = [];
          }
          winnersByClub[winner.clubId].push(winner);
        });

        // Display winners for each club
        Object.keys(winnersByClub).forEach(clubId => {
          const clubWinners = winnersByClub[clubId];
          const club = clubs.find(c => c.id === clubId);
          const clubName = club ? club.name : `Club ${clubId.substring(0, 8)}`;
          
          const clubDiv = document.createElement('div');
          clubDiv.className = 'winner-item';
          clubDiv.innerHTML = `
            <div class="winner-club">${sanitizeInput(clubName)}</div>
            <div class="winner-event">${clubWinners.length} winner${clubWinners.length > 1 ? 's' : ''} announced</div>
            <div class="winner-details">Click to view details</div>
          `;
          
          clubDiv.addEventListener('click', () => showWinnersForClub(clubId, clubName));
          winnersListElem.appendChild(clubDiv);
        });
      })
      .catch(error => {
        console.error('Error fetching winners:', error);
        winnersListElem.innerHTML = '<p style="text-align: center; opacity: 0.7;">Failed to load winners.</p>';
      });
  }

  function showWinnersForClub(clubId, clubName) {
    const winnersModal = document.getElementById('winnersModal');
    const winnersModalTitle = document.getElementById('winnersModalTitle');
    const winnersModalList = document.getElementById('winnersModalList');
    
    winnersModalTitle.textContent = `🏆 Winners - ${sanitizeInput(clubName)}`;
    winnersModalList.innerHTML = '<p style="text-align: center; opacity: 0.8;">Loading winners...</p>';

    // Fetch events for this club
    fetch(`${API_BASE_URL}/events/club/${clubId}`)
      .then(response => response.json())
      .then(clubEvents => {
        // Fetch winners for this club
        return fetch(`${API_BASE_URL}/winners/club/${clubId}`)
          .then(response => response.json())
          .then(winners => ({ events: clubEvents, winners: winners }));
      })
      .then(({ events, winners }) => {
        winnersModalList.innerHTML = '';
        
        if (winners.length === 0) {
          winnersModalList.innerHTML = '<p style="text-align: center; opacity: 0.8;">No winners announced for this club yet.</p>';
          return;
        }

        // Group winners by event
        const winnersByEvent = {};
        winners.forEach(winner => {
          if (!winnersByEvent[winner.eventId]) {
            winnersByEvent[winner.eventId] = [];
          }
          winnersByEvent[winner.eventId].push(winner);
        });

        // Display winners for each event
        Object.keys(winnersByEvent).forEach(eventId => {
          const eventWinners = winnersByEvent[eventId];
          const event = events.find(e => e.id === eventId);
          const eventName = event ? event.name : `Event ${eventId.substring(0, 8)}`;
          
          const eventDiv = document.createElement('div');
          eventDiv.className = 'winner-item';
          eventDiv.style.marginBottom = '15px';
          
          let winnersHtml = '';
          eventWinners.forEach(winner => {
            const positionClass = `position-${winner.position.toLowerCase()}`;
            winnersHtml += `
              <div style="margin: 8px 0; padding: 8px; background: rgba(255,255,255,0.1); border-radius: 6px;">
                <span class="winner-position ${positionClass}">${winner.positionDisplayName}</span>
                <strong>${sanitizeInput(winner.fullName)}</strong> (${sanitizeInput(winner.username)})
                <br><small style="opacity: 0.8;">${sanitizeInput(winner.email)} | ${sanitizeInput(winner.mobile)}</small>
              </div>
            `;
          });
          
          eventDiv.innerHTML = `
            <div class="winner-event" style="font-size: 1rem; font-weight: 700; margin-bottom: 10px;">🎯 ${sanitizeInput(eventName)}</div>
            ${winnersHtml}
          `;
          
          winnersModalList.appendChild(eventDiv);
        });
      })
      .catch(error => {
        console.error('Error fetching club winners:', error);
        winnersModalList.innerHTML = '<p style="text-align: center; opacity: 0.8;">Failed to load winners.</p>';
      });

    winnersModal.classList.add('visible');
  }

  function closeWinnersModal() {
    document.getElementById('winnersModal').classList.remove('visible');
  }

  function populateNotifications() {
    const notificationsElem = document.getElementById('notificationList');
    notificationsElem.innerHTML = '<li>Loading notifications...</li>';

    fetch(`${API_BASE_URL}/events`)
      .then(response => response.json())
      .then(allEvents => {
        // Fetch all winners to filter out completed events
        return fetch(`${API_BASE_URL}/winners`)
          .then(response => response.json())
          .then(winners => {
            const eventIdsWithWinners = new Set(winners.map(w => w.eventId));
            // Filter out events that have winners announced
            const activeEvents = allEvents.filter(event => !eventIdsWithWinners.has(event.id));
            return activeEvents;
          })
          .catch(() => allEvents);
      })
      .then(allEvents => {
        notificationsElem.innerHTML = '';
        const recentEvents = allEvents.slice(0, 7);

        if (recentEvents.length === 0) {
          notificationsElem.innerHTML = '<li>No recent events available.</li>';
          return;
        }

        recentEvents.forEach(event => {
          const li = document.createElement('li');
          const clubName = clubs.find(c => c.id === event.clubId)?.name || '';
          const startStr = new Date(event.regStart).toLocaleString([], {dateStyle: 'short', timeStyle: 'short'});
          const endStr = new Date(event.regEnd).toLocaleString([], {dateStyle: 'short', timeStyle: 'short'});
          const regCount = event.registrations ? event.registrations.length : 0;
          li.innerHTML = `<strong>${sanitizeInput(event.name)}</strong> (${sanitizeInput(clubName)}) <br/>
            <span class="date">From: ${startStr} to ${endStr}</span><br/>
            <span class="date">Registrations: ${regCount}</span>`;
          notificationsElem.appendChild(li);
        });
      })
      .catch(error => {
        console.error('Error fetching notifications:', error);
        notificationsElem.innerHTML = '<li>Failed to load notifications.</li>';
      });
  }

  function toggleMenu() {
    const menu = document.getElementById('sideMenu');
    menu.classList.toggle('visible');
  }

  function updateMenuUserDetails() {
    const userDetailsLink = document.getElementById('userAccountDetailsLink');
    if (currentUser) {
      userDetailsLink.textContent = `Account: ${sanitizeInput(currentUser.username)} (${currentUser.role})`;
      userDetailsLink.addEventListener('click', () => {
        alert(`Username: ${sanitizeInput(currentUser.username)}\nRole: ${currentUser.role}`);
      });
      userDetailsLink.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          alert(`Username: ${sanitizeInput(currentUser.username)}\nRole: ${currentUser.role}`);
        }
      });
    }
  }

  function logout() {
    if (confirm("Do you want to logout?")) {
      currentUser = null;
      authToken = null;
      localStorage.removeItem('cem_user');
      localStorage.removeItem('cem_token');
      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      closeEventsModal();
      document.getElementById('sideMenu').classList.remove('visible');
    }
  }

  
  function about() {
    alert('College Event Management Website\nVersion 1.0\nCreated for educational purposes');
  }

  function goHome() {
    alert('You are already on the Home page.');
  }
  function contact() {
    alert('Contact us at: contact@collegeevents.edu');
  }
  function helpPage() {
    alert('Help:\n- Use the menu ☰ for account options\n- Click clubs to see events\n- Register for events as a student');
  }

  
  let currentEventsClubId = null;
  let lastFocusedElement = null;

  function trapFocus(modal, firstFocusable, lastFocusable) {
    modal.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === firstFocusable) {
            e.preventDefault();
            lastFocusable.focus();
          }
        } else {
          if (document.activeElement === lastFocusable) {
            e.preventDefault();
            firstFocusable.focus();
          }
        }
      }
    });
  }

  function showEvents(clubId, triggerElement) {
    lastFocusedElement = triggerElement;
    currentEventsClubId = clubId;
    const club = clubs.find(c => c.id === clubId);
    const eventsModal = document.getElementById('eventsModal');
    const eventsModalTitle = document.getElementById('eventsModalTitle');
    const eventsListElem = document.getElementById('eventsList');
    eventsModalTitle.textContent = `Events - ${club ? sanitizeInput(club.name) : ''}`;
    eventsListElem.innerHTML = '<p>Loading events...</p>';

    // Fetch events for this club from backend
    fetch(`${API_BASE_URL}/events/club/${clubId}`)
      .then(response => response.json())
      .then(clubEvents => {
        // Fetch winners for this club to filter out completed events
        return fetch(`${API_BASE_URL}/winners/club/${clubId}`)
          .then(response => response.json())
          .then(winners => {
            // Get set of event IDs that have winners
            const eventIdsWithWinners = new Set(winners.map(w => w.eventId));
            // Filter out events that have winners announced
            const activeEvents = clubEvents.filter(event => !eventIdsWithWinners.has(event.id));
            return activeEvents;
          })
          .catch(() => clubEvents); // If winners fetch fails, show all events
      })
      .then(clubEvents => {
        eventsListElem.innerHTML = '';
        if (clubEvents.length === 0) {
          eventsListElem.innerHTML = '<p>No active events found for this club. Winners have been announced for all events.</p>';
        } else {
          clubEvents.forEach(event => {
            const box = document.createElement('div');
            box.className = 'eventBox';
            if (event.bgImageUrl) {
              box.style.backgroundImage = `url('${sanitizeInput(event.bgImageUrl)}')`;
              box.style.backgroundSize = 'cover';
              box.style.backgroundPosition = 'center';
              box.style.color = 'white';
              box.style.textShadow = '1px 1px 6px rgba(0,0,0,0.7)';
            }

            const cap = (event.capacity != null && Number(event.capacity) > 0) ? Number(event.capacity) : 0;
            const currentCount = (event.registrations && Array.isArray(event.registrations)) ? event.registrations.length : 0;
            const isFull = (cap > 0 && currentCount >= cap);
            const capLabel = cap > 0 ? `${currentCount}/${cap} participants` : `${currentCount} participants`;

            box.innerHTML = `
              <h3>${sanitizeInput(event.name)}</h3>
              <p>${sanitizeInput(event.description)}</p>
              <p style="margin:6px 0; font-size: 13px;">${sanitizeInput(capLabel)}</p>
              <button class="registerBtn" aria-label="Register for ${sanitizeInput(event.name)}" ${isFull ? 'disabled' : ''}>${isFull ? 'Event Full' : 'Register'}</button>
              <div class="regMsg" role="alert" aria-live="assertive"></div>
            `;

            const registerBtn = box.querySelector('.registerBtn');
            const regMsg = box.querySelector('.regMsg');

            registerBtn.addEventListener('click', () => {
              if (isFull) {
                regMsg.style.color = 'red';
                regMsg.textContent = 'Event is full';
                return;
              }
              if (currentUser && currentUser.role === 'user') {
                regMsg.textContent = '';

                const ok = confirm(`Confirm registration for ${event.name}?`);
                if (!ok) {
                  return;
                }

                fetch(`${API_BASE_URL}/events/${event.id}/register`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                  },
                  body: JSON.stringify({})
                })
                .then(async (response) => {
                  let data = null;
                  try {
                    data = await response.json();
                  } catch (e) {
                    data = { message: 'Request failed' };
                  }

                  if (!response.ok) {
                    if (response.status === 401) {
                      data = data && data.message ? data : { message: 'Session expired. Please login again.' };
                      try { logout(); } catch (e) {}
                    }
                  }

                  return data;
                })
                .then(data => {
                  if (data.message === 'Registration successful') {
                    regMsg.style.color = 'green';
                    regMsg.textContent = 'Registration successful!';
                    populateNotifications();
                    setTimeout(() => {
                      regMsg.textContent = '';
                    }, 2000);
                  } else {
                    const msg = data && data.message ? data.message : 'Registration failed';
                    const isError = msg.toLowerCase().includes('full') || msg.toLowerCase().includes('failed') || msg.toLowerCase().includes('ended') || msg.toLowerCase().includes('not started') || msg.toLowerCase().includes('already') || msg.toLowerCase().includes('missing') || msg.toLowerCase().includes('invalid');
                    regMsg.style.color = isError ? 'red' : 'green';
                    regMsg.textContent = msg;
                  }
                })
                .catch(() => {
                  regMsg.style.color = 'red';
                  regMsg.textContent = 'Registration failed. Please try again.';
                });
              } else {
                alert('Only logged-in users can register for events.');
              }
            });

            eventsListElem.appendChild(box);
          });
        }
      })
      .catch(error => {
        console.error('Error fetching events:', error);
        eventsListElem.innerHTML = '<p>Failed to load events. Please try again.</p>';
      });

    eventsModal.classList.add('visible');
    const firstFocusable = eventsModal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    const lastFocusable = eventsModal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (firstFocusable) firstFocusable.focus();
    trapFocus(eventsModal, firstFocusable, lastFocusable[lastFocusable.length - 1]);
  }

  function closeEventsModal() {
    document.getElementById('eventsModal').classList.remove('visible');
    currentEventsClubId = null;
    if (lastFocusedElement) {
      lastFocusedElement.focus();
      lastFocusedElement = null;
    }
  }

  
  function closeSideMenu() {
    const sideMenu = document.getElementById('sideMenu');
    if (sideMenu.classList.contains('visible')) {
      sideMenu.classList.remove('visible');
      document.getElementById('menuToggle').focus();
    }
  }

  document.addEventListener('click', (e) => {
    const sideMenu = document.getElementById('sideMenu');
    const menuToggle = document.getElementById('menuToggle');
    if (
      sideMenu.classList.contains('visible') &&
      !sideMenu.contains(e.target) &&
      !menuToggle.contains(e.target)
    ) {
      closeSideMenu();
    }
  });

  function setupEventListeners() {
    document.getElementById('eventsModal').addEventListener('click', e => {
      if (e.target === document.getElementById('eventsModal')) closeEventsModal();
    });
    document.getElementById('winnersModal').addEventListener('click', e => {
      if (e.target === document.getElementById('winnersModal')) closeWinnersModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('eventsModal').classList.contains('visible')) {
          closeEventsModal();
        } else if (document.getElementById('winnersModal').classList.contains('visible')) {
          closeWinnersModal();
        } else if (document.getElementById('sideMenu').classList.contains('visible')) {
          closeSideMenu();
        }
      }
    });
  }

  window.onload = () => {
    loadData();
    if (currentUser) {
      loginSuccess();
    } else {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('mainPage').style.display = 'none';
    }
    setupEventListeners();
  };
</script>
