# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/event_management

# Server Configuration
server.port=7070

# JWT Configuration
jwt.secret=mySuperSecretKeyForJWTTokenGenerationAndValidationThatIsLongEnoughForHS256AlgorithmRequirements
jwt.expiration=86400000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:7070,http://127.0.0.1:7070
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
