<!DOCTYPE html>
<html>
<head>
    <title>Check Pending Club Admins</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Check Pending Club Admins</h1>
    
    <div class="section">
        <h2>Login Test</h2>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="section">
        <h2>Pending Club Admins</h2>
        <button onclick="testPendingAdmins()">Load Pending Club Admins</button>
        <div id="pendingResult"></div>
    </div>
    
    <div class="section">
        <h2>All Users</h2>
        <button onclick="testAllUsers()">Load All Users</button>
        <div id="usersResult"></div>
    </div>
    
    <div class="section">
        <h2>Clubs</h2>
        <button onclick="testClubs()">Load Clubs</button>
        <div id="clubsResult"></div>
    </div>

    <script>
        let token = '';
        let clubsCache = [];

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:7070/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    document.getElementById('loginResult').innerHTML = '<span class="success">Login successful!</span>';
                } else {
                    document.getElementById('loginResult').innerHTML = '<span class="error">Login failed: ' + (data.message || 'Unknown error') + '</span>';
                }
            } catch (error) {
                document.getElementById('loginResult').innerHTML = '<span class="error">Login error: ' + error.message + '</span>';
            }
        }

        async function testClubs() {
            if (!token) {
                document.getElementById('clubsResult').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            try {
                const response = await fetch('http://localhost:7070/api/clubs', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    clubsCache = data;
                    document.getElementById('clubsResult').innerHTML = '<span class="success">Clubs loaded: ' + data.length + ' clubs</span><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    document.getElementById('clubsResult').innerHTML = '<span class="error">Failed to load clubs: ' + (data.message || 'Unknown error') + '</span>';
                }
            } catch (error) {
                document.getElementById('clubsResult').innerHTML = '<span class="error">Clubs error: ' + error.message + '</span>';
            }
        }

        async function testPendingAdmins() {
            if (!token) {
                document.getElementById('pendingResult').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            try {
                const response = await fetch('http://localhost:7070/api/admin/club-admins/pending', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    let html = '<span class="success">Pending club admins: ' + data.length + ' found</span>';
                    if (data.length > 0) {
                        html += '<table>';
                        html += '<tr><th>Username</th><th>Full Name</th><th>Mobile</th><th>Email</th><th>Gender</th><th>Club ID</th></tr>';
                        for (const admin of data) {
                            html += '<tr>';
                            html += '<td>' + (admin.username || 'N/A') + '</td>';
                            html += '<td>' + (admin.fullName || 'N/A') + '</td>';
                            html += '<td>' + (admin.mobile || 'N/A') + '</td>';
                            html += '<td>' + (admin.email || 'N/A') + '</td>';
                            html += '<td>' + (admin.gender || 'N/A') + '</td>';
                            html += '<td>' + (admin.adminClubId || 'N/A') + '</td>';
                            html += '</tr>';
                        }
                        html += '</table>';
                    } else {
                        html += '<p>No pending club admins found. This might explain why the club admin table is empty!</p>';
                        html += '<p><strong>To test the club admin table, you need to:</strong></p>';
                        html += '<ol>';
                        html += '<li>Create a club admin account (they will be pending by default)</li>';
                        html += '<li>Approve the club admin in the superadmin panel</li>';
                        html += '<li>Then they will appear in the club admins table</li>';
                        html += '</ol>';
                    }
                    document.getElementById('pendingResult').innerHTML = html;
                } else {
                    document.getElementById('pendingResult').innerHTML = '<span class="error">Failed to load pending admins: ' + (data.message || 'Unknown error') + '</span>';
                }
            } catch (error) {
                document.getElementById('pendingResult').innerHTML = '<span class="error">Pending admins error: ' + error.message + '</span>';
            }
        }

        async function testAllUsers() {
            if (!token) {
                document.getElementById('usersResult').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            try {
                const response = await fetch('http://localhost:7070/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    const clubAdmins = data.filter(u => (u.role || '').toUpperCase() === 'CLUB_ADMIN');
                    const enabledClubAdmins = clubAdmins.filter(u => u.enabled);
                    const disabledClubAdmins = clubAdmins.filter(u => !u.enabled);
                    
                    let html = '<span class="success">All users loaded: ' + data.length + ' total users</span>';
                    html += '<p>Club Admins: ' + clubAdmins.length + ' total</p>';
                    html += '<p>Enabled Club Admins: ' + enabledClubAdmins.length + '</p>';
                    html += '<p>Disabled Club Admins (Pending): ' + disabledClubAdmins.length + '</p>';
                    
                    if (clubAdmins.length > 0) {
                        html += '<h4>All Club Admins:</h4>';
                        html += '<table>';
                        html += '<tr><th>Username</th><th>Role</th><th>Mobile</th><th>Club ID</th><th>Enabled</th></tr>';
                        for (const admin of clubAdmins) {
                            html += '<tr>';
                            html += '<td>' + (admin.username || 'N/A') + '</td>';
                            html += '<td>' + (admin.role || 'N/A') + '</td>';
                            html += '<td>' + (admin.mobile || 'N/A') + '</td>';
                            html += '<td>' + (admin.adminClubId || 'N/A') + '</td>';
                            html += '<td>' + (admin.enabled ? 'Yes' : 'No') + '</td>';
                            html += '</tr>';
                        }
                        html += '</table>';
                    }
                    
                    document.getElementById('usersResult').innerHTML = html;
                } else {
                    document.getElementById('usersResult').innerHTML = '<span class="error">Failed to load users: ' + (data.message || 'Unknown error') + '</span>';
                }
            } catch (error) {
                document.getElementById('usersResult').innerHTML = '<span class="error">Users error: ' + error.message + '</span>';
            }
        }
    </script>
</body>
</html>
